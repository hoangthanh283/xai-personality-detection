transformer:
  distilbert:
    model_name: distilbert-base-uncased
    use_pretrained: true
    max_length: 512
    truncation_strategy: head_tail
    batch_size: 8
    learning_rate: 2.0e-5
    weight_decay: 0.01
    num_epochs: 2
    warmup_ratio: 0.1
    lr_scheduler: linear
    early_stopping_patience: 1
    fp16: true
    gradient_accumulation_steps: 2

  roberta:
    model_name: roberta-base
    use_pretrained: true
    max_length: 512
    truncation_strategy: head_tail
    batch_size: 4
    learning_rate: 2.0e-5
    weight_decay: 0.01
    num_epochs: 2
    warmup_ratio: 0.1
    lr_scheduler: linear
    early_stopping_patience: 1
    fp16: true
    gradient_accumulation_steps: 4

  dataset_overrides:
    essays:
      max_length: 384
      num_epochs: 2
      early_stopping_patience: 1
    personality_evd:
      max_length: 64
      num_epochs: 2
      early_stopping_patience: 1
      distilbert:
        model_name: distilbert-base-multilingual-cased
      roberta:
        model_name: xlm-roberta-base

output_dir: outputs/models/
seed: 42
