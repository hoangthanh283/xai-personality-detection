# Tier 5B — Ablation: NO Knowledge Base (drops KB retrieval)
# Tests M3 — does the psychology KB contribute to grounding?
# Inherits Tier 5A defaults; overrides cope.num_kb_chunks=0.
tier: tier5b
description: RAG-XPR ablation — drop KB retrieval, keep evidence + CoPE.

_base: retrieval_config.yaml

llm:
  provider: ollama
  model: qwen2.5:3b-instruct-q4_K_M
  base_url: http://localhost:11434/api/chat
  temperature: 0.1
  max_tokens: 2048
  timeout: 300
  retry_attempts: 3
  seed: 42

retrieval:
  embedding_model: BAAI/bge-base-en-v1.5
  qdrant_url: http://localhost:6333
  collection: psych_kb_ocean_v3

cope:
  num_evidence: 6
  num_kb_chunks: 0                    # ← ablation knob
  framework: ocean
  max_retries_per_step: 2
  aggregation: llm_aggregate

evidence_retrieval:
  method: hybrid
  alpha: 0.7
  pre_filter: true
  top_k: 6
  backbone: frozen_svm
  scorer: roberta
  use_roberta_prior: true
  roberta_device: cpu
  roberta_batch_size: 16

inference:
  log_every_n: 20
  batch_size: 1
  ablation: no_kb

wandb:
  group: tier5_ablations
  tags: [tier5b, ablation, no_kb, qwen2.5_3b]

tensorboard:
  enabled: true

output:
  save_intermediate: true
  output_dir: outputs/predictions/
