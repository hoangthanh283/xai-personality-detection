# Tier 5D — Ablation: NO CoPE 3-step (single-shot trait prediction)
# Tests M4 — is the explicit Evidence → State → Trait reasoning chain
# necessary, or can we skip Step 1+2 with just majority-vote aggregation?
tier: tier5d
description: RAG-XPR ablation — disable CoPE 3-step, predict traits directly.

_base: retrieval_config.yaml

llm:
  provider: ollama
  model: qwen2.5:3b-instruct-q4_K_M
  base_url: http://localhost:11434/api/chat
  temperature: 0.1
  max_tokens: 1024                    # short output, no CoPE chain
  timeout: 300
  retry_attempts: 3
  seed: 42

retrieval:
  embedding_model: BAAI/bge-base-en-v1.5
  qdrant_url: http://localhost:6333
  collection: psych_kb_ocean_v3

cope:
  num_evidence: 6
  num_kb_chunks: 3
  framework: ocean
  max_retries_per_step: 2
  aggregation: majority               # ← ablation knob: skip Step 1+2 reasoning

evidence_retrieval:
  method: hybrid
  alpha: 0.7
  pre_filter: true
  top_k: 6
  backbone: frozen_svm
  scorer: roberta
  use_roberta_prior: true
  roberta_device: cpu
  roberta_batch_size: 16

inference:
  log_every_n: 20
  batch_size: 1
  ablation: no_cope

wandb:
  group: tier5_ablations
  tags: [tier5d, ablation, no_cope, qwen2.5_3b]

tensorboard:
  enabled: true

output:
  save_intermediate: true
  output_dir: outputs/predictions/
