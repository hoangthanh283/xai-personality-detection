tfidf:
  max_features: 50000
  ngram_range: [1, 2]
  sublinear_tf: true
  min_df: 3
  max_df: 0.95

ml_models:
  logistic_regression:
    max_iter: 3000
    class_weight: balanced
    C: 1.0
    solver: saga

  svm:
    max_iter: 10000
    class_weight: balanced
    C: 1.0
    dual: auto

  naive_bayes:
    alpha: 0.5

  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    tree_method: hist
    n_jobs: 4
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: mlogloss

  random_forest:
    n_estimators: 300
    max_depth: 20
    class_weight: balanced
    n_jobs: 4

grid_search:
  cv: 5
  n_jobs: -1
  scoring: f1_macro
  param_grid:
    logistic_regression:
      clf__C: [0.1, 0.5, 1.0, 2.0, 5.0, 10.0]
    svm:
      clf__C: [0.01, 0.1, 0.5, 1.0, 2.0, 5.0]
    naive_bayes:
      clf__alpha: [0.01, 0.05, 0.1, 0.5, 1.0, 2.0, 5.0]
    xgboost:
      clf__n_estimators: [100, 200, 300]
      clf__max_depth: [4, 6, 8]
      clf__learning_rate: [0.05, 0.1]
    random_forest:
      clf__n_estimators: [200, 300, 500]
      clf__max_depth: [20, 50, null]

transformer:
  distilbert:
    model_name: distilbert-base-uncased
    use_pretrained: true
    max_length: 512
    batch_size: 8
    learning_rate: 2.0e-5
    weight_decay: 0.01
    num_epochs: 50
    warmup_ratio: 0.1
    lr_scheduler: linear
    early_stopping_patience: 5
    fp16: true
    gradient_accumulation_steps: 2

  roberta:
    model_name: roberta-base
    use_pretrained: true
    max_length: 512
    batch_size: 4
    learning_rate: 2.0e-5
    weight_decay: 0.01
    num_epochs: 50
    warmup_ratio: 0.1
    lr_scheduler: linear
    early_stopping_patience: 5
    fp16: true
    gradient_accumulation_steps: 4

  dataset_overrides:
    essays:
      max_length: 384
      num_epochs: 10
      early_stopping_patience: 3
    pandora_big5:
      max_length: 128
      num_epochs: 1
      early_stopping_patience: 1
    personality_evd:
      max_length: 64
      num_epochs: 10
      early_stopping_patience: 3
      distilbert:
        model_name: distilbert-base-multilingual-cased
      roberta:
        model_name: xlm-roberta-base

output_dir: outputs/models/
seed: 42
