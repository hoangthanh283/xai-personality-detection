tfidf:
  max_features: 15000
  ngram_range: [1, 2]
  sublinear_tf: true
  min_df: 5
  max_df: 0.90
  use_char_ngrams: false
  # Note: 15K features + min_df=5 reduces overfitting vs original 50K+char union

tfidf_char:
  analyzer: char_wb
  ngram_range: [3, 5]
  max_features: 20000
  sublinear_tf: true
  min_df: 3
  max_df: 0.95

dimensionality_reduction:
  enabled: false
  n_components: 300

ml_models:
  logistic_regression:
    max_iter: 5000
    class_weight: balanced
    C: 0.5
    solver: lbfgs

  svm:
    max_iter: 10000
    class_weight: null
    C: 1.0
    dual: auto

  naive_bayes:
    alpha: 1.0

  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.1
    tree_method: hist
    n_jobs: 2
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: mlogloss
    reg_lambda: 1.0

  random_forest:
    n_estimators: 300
    max_depth: 30
    class_weight: null
    n_jobs: 4

grid_search:
  cv: 5
  n_jobs: -1
  scoring: f1_macro
  param_grid:
    logistic_regression:
      clf__C: [0.5, 1.0, 4.0, 10.0]
    svm:
      clf__C: [0.1, 0.5, 1.0, 4.0]
    naive_bayes:
      clf__alpha: [0.1, 0.5, 1.0, 2.0]
    xgboost:
      clf__n_estimators: [200, 400]
      clf__max_depth: [4, 6]
      clf__learning_rate: [0.05, 0.1]
    random_forest:
      clf__n_estimators: [300, 500]
      clf__max_depth: [20, 50, null]

transformer:
  distilbert:
    model_name: distilbert-base-uncased
    use_pretrained: true
    max_length: 512
    batch_size: 16
    learning_rate: 1.0e-5
    weight_decay: 0.01
    num_epochs: 15          # allow full convergence; early stopping will terminate
    warmup_ratio: 0.1       # longer warmup stabilises early training
    lr_scheduler: cosine    # cosine decay prevents LR from staying high late
    early_stopping_patience: 5   # wait longer before giving up
    fp16: true
    gradient_accumulation_steps: 2
    dropout: 0.1
    loss_weighting: none
    metric_for_best_model: eval_accuracy

  roberta:
    model_name: roberta-base
    use_pretrained: true
    max_length: 512
    batch_size: 2
    learning_rate: 1.0e-5   # halved: 2e-5 overshoots on small MBTI; 1e-5 converges smoothly
    weight_decay: 0.01
    num_epochs: 20          # allow full convergence; early stopping will terminate
    warmup_ratio: 0.1       # longer warmup matches the lower LR ramp
    lr_scheduler: cosine    # cosine decay prevents oscillation late in training
    early_stopping_patience: 5   # give the model time past a local plateau
    fp16: true
    gradient_accumulation_steps: 8   # effective batch = 16
    dropout: 0.1
    loss_weighting: none
    metric_for_best_model: eval_accuracy

  dataset_overrides:
    essays:
      max_length: 384
      num_epochs: 20
      early_stopping_patience: 5
    pandora:
      max_length: 256
      num_epochs: 10
      early_stopping_patience: 4
      batch_size: 32
    pandora_big5:
      max_length: 256
      num_epochs: 10
      early_stopping_patience: 4
    personality_evd:
      max_length: 256
      num_epochs: 20
      early_stopping_patience: 5
      distilbert:
        model_name: distilbert-base-multilingual-cased
      roberta:
        model_name: xlm-roberta-base

lstm:
  vocab_size: 30000
  embed_dim: 300
  hidden_dim: 256
  num_layers: 2
  bidirectional: true
  dropout: 0.3
  attention: true
  max_length: 512
  batch_size: 64
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  num_epochs: 20
  early_stopping_patience: 5
  loss_weighting: none
  glove_path: null        # set to path of glove.6B.300d.txt to use pretrained embeddings
  freeze_embeddings: false

output_dir: outputs/models/
seed: 42
