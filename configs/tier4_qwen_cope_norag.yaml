# ────────────────────────────────────────────────────────────────────────────
# Tier 4 — Qwen 2.5 3B + CoPE 3-step (NO RAG, NO KB)
# Motivation: M2 + M4 — does CoT (CoPE) reduce hallucination without retrieval?
# Run scope: 2 W&B runs (Essays + PerEvd OCEAN). Skip MBTI (long-form latency)
# and Pandora (test 232 records too small).
# Implementation: full RAG-XPR pipeline with --ablation no_kb (KB chunks dropped).
# ────────────────────────────────────────────────────────────────────────────
tier: tier4
description: Qwen + CoPE 3-step without external knowledge base.

_base: retrieval_config.yaml

llm:
  provider: ollama
  model: qwen2.5:3b-instruct-q4_K_M
  base_url: http://localhost:11434/api/chat
  temperature: 0.1
  max_tokens: 2048                    # CoPE 3-step output dài
  timeout: 300
  retry_attempts: 3
  seed: 42

retrieval:
  embedding_model: BAAI/bge-base-en-v1.5
  qdrant_url: http://localhost:6333
  collection: psych_kb_ocean_v3

cope:
  num_evidence: 6
  num_kb_chunks: 0                    # ← KEY: no KB
  framework: ocean
  max_retries_per_step: 2
  aggregation: llm_aggregate

evidence_retrieval:
  method: hybrid
  alpha: 0.7
  pre_filter: true
  top_k: 6
  backbone: frozen_svm
  scorer: keyword                     # avoid roberta scorer (Tier 4 baseline only)
  use_roberta_prior: false
  roberta_device: cpu
  roberta_batch_size: 16

inference:
  log_every_n: 20
  batch_size: 1
  ablation: no_kb                     # explicit so InferenceLogger knows kb_eligible=False

wandb:
  group: tier4
  tags: [tier4, qwen2.5_3b, cope, no_rag]

tensorboard:
  enabled: true

output:
  save_intermediate: true             # debug CoPE 3-step outputs
  output_dir: outputs/predictions/
