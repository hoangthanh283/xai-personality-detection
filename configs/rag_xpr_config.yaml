_base: retrieval_config.yaml

llm:
  provider: ollama                       # openrouter | openai | vllm | ollama
  model: qwen2.5:7b                      # local Ollama model (Q4_K_M, ~4.4 GB VRAM)
  base_url: http://localhost:11434/api/chat
  temperature: 0.1
  max_tokens: 2048
  timeout: 120                           # local inference needs more time
  retry_attempts: 3

  # Fallback: uncomment to use free OpenRouter tier when offline
  # provider: openrouter
  # model: qwen/qwen3-8b:free
  # base_url: https://openrouter.ai/api/v1
  # timeout: 60

retrieval:
  embedding_model: BAAI/bge-base-en-v1.5
  qdrant_url: http://localhost:6333
  collection: psych_kb

cope:
  num_evidence: 10        # max evidence to extract in Step 1
  num_kb_chunks: 5        # KB chunks per evidence in Step 2
  framework: mbti          # mbti | ocean
  max_retries_per_step: 2  # retry on JSON parse failure
  aggregation: llm_aggregate   # majority | weighted | llm_aggregate

evidence_retrieval:
  method: hybrid           # semantic | keyword | hybrid
  alpha: 0.7              # weight for semantic in hybrid
  pre_filter: true         # use keyword pre-filter before LLM
  top_k: 10

output:
  save_intermediate: true  # save step 1/2/3 outputs for debugging
  output_dir: outputs/predictions/
