_base: retrieval_config.yaml

llm:
  provider: ollama                                                                   # openrouter | openai | vllm | ollama
  model: hf.co/HauhauCS/Gemma-4-E2B-Uncensored-HauhauCS-Aggressive:Q6_K_P             # local Gemma-4-E2B (fast, ~5 GB)
  base_url: http://localhost:11434/api/chat
  temperature: 0.1
  max_tokens: 2048
  timeout: 300
  retry_attempts: 3

  # Alternative: larger local Qwen for accuracy
  # provider: ollama
  # model: qwen2.5:7b
  # base_url: http://localhost:11434/api/chat
  # timeout: 120

  # Fallback: OpenRouter API (if API quota available)
  # provider: openrouter
  # model: qwen/qwen-2.5-7b-instruct
  # base_url: https://openrouter.ai/api/v1
  # timeout: 90

retrieval:
  embedding_model: BAAI/bge-base-en-v1.5
  qdrant_url: http://localhost:6333
  collection: psych_kb_ocean_v2

cope:
  num_evidence: 6          # max evidence to extract in Step 1 (reduced for local LLM speed)
  num_kb_chunks: 3         # KB chunks per evidence in Step 2 (reduced)
  framework: mbti          # mbti | ocean
  max_retries_per_step: 2  # retry on JSON parse failure
  aggregation: llm_aggregate   # majority | weighted | llm_aggregate

evidence_retrieval:
  method: hybrid           # semantic | keyword | hybrid  (KB retrieval mode)
  alpha: 0.7              # weight for semantic in hybrid
  pre_filter: true         # use pre-filter before LLM
  top_k: 6                 # number of candidate sentences to feed Step 1

  # Supervised sentence scorer backbone.
  # "frozen_svm" (default): FrozenBertSvmBaseline — balanced class weights, strong minority recall
  # "roberta":              Fine-tuned RoBERTa — legacy; majority-class collapse on imbalanced dims
  backbone: frozen_svm
  scorer: roberta          # keyword | roberta (roberta = use backbone for sentence scoring)
  use_roberta_prior: true  # inject doc-level backbone prediction into Step-3 prompt
  roberta_device: cpu      # cpu | cuda  (cpu avoids VRAM conflict with local LLM)
  roberta_batch_size: 16
  # frozen_svm_checkpoints:  # (optional override — defaults chosen by framework)
  #   IE: outputs/models/frozen_bert_svm_mbti_IE/model.pkl
  #   SN: outputs/models/frozen_bert_svm_mbti_SN/model.pkl
  #   TF: outputs/models/frozen_bert_svm_mbti_TF/model.pkl
  #   JP: outputs/models/frozen_bert_svm_mbti_JP/model.pkl

output:
  save_intermediate: true  # save step 1/2/3 outputs for debugging
  output_dir: outputs/predictions/
