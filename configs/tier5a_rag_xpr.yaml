# ────────────────────────────────────────────────────────────────────────────
# Tier 5A — RAG-XPR Full pipeline
# Motivation: All 5 motivations. KB + Evidence Retrieval + CoPE 3-step.
# Run scope: 4 W&B runs (MBTI 4dim + Essays/Pandora/PerEvd).
# This config is the canonical RAG-XPR setup (replaces legacy rag_xpr_config.yaml
# for new runs; old config kept untouched for reproducibility of past runs).
# ────────────────────────────────────────────────────────────────────────────
tier: tier5a
description: Full RAG-XPR — Knowledge Base + Evidence Retrieval + CoPE 3-step.

_base: retrieval_config.yaml

llm:
  provider: ollama
  model: qwen2.5:3b-instruct-q4_K_M
  base_url: http://localhost:11434/api/chat
  temperature: 0.1
  max_tokens: 2048
  timeout: 300
  retry_attempts: 3
  seed: 42

retrieval:
  embedding_model: BAAI/bge-base-en-v1.5
  qdrant_url: http://localhost:6333
  collection: psych_kb_ocean_v3

cope:
  num_evidence: 6
  num_kb_chunks: 3
  framework: ocean                    # MBTI overrides on CLI via --framework
  max_retries_per_step: 2
  aggregation: llm_aggregate

evidence_retrieval:
  method: hybrid
  alpha: 0.7
  pre_filter: true
  top_k: 6
  backbone: frozen_svm
  scorer: roberta
  use_roberta_prior: true
  roberta_device: cpu
  roberta_batch_size: 16

inference:
  log_every_n: 20
  batch_size: 1
  ablation: full                      # canonical full pipeline

wandb:
  group: tier5a
  tags: [tier5a, qwen2.5_3b, rag_xpr, full]

tensorboard:
  enabled: true

output:
  save_intermediate: true
  output_dir: outputs/predictions/
