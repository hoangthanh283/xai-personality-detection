# ────────────────────────────────────────────────────────────────────────────
# Tier 2a — RoBERTa-base + Focal Loss + Balanced Sampler
# Motivation: cause #3 (class imbalance). Replaces sqrt_balanced CE with focal
# loss (gamma=2.0) that focuses on hard examples + WeightedRandomSampler that
# rebalances each batch. Targets MBTI SN/IE imbalance and Pandora 60-68%
# majority traits where weighted CE only gave marginal recall improvement.
# Run scope: 4 datasets × OCEAN/4dim = 4 W&B runs (parallels tier2a_roberta_trunc.yaml).
# ────────────────────────────────────────────────────────────────────────────
tier: tier2a_focal
description: RoBERTa-base + focal loss + balanced sampler for imbalanced classification.

model:
  type: roberta
  model_name: roberta-base
  use_pretrained: true
  max_length: 512
  truncation_strategy: head_tail        # match cause #1 mitigation
  strategy: truncation
  dropout: 0.1

training:
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  weight_decay: 0.01
  num_epochs: 200
  warmup_ratio: 0.05
  lr_scheduler: cosine
  fp16: true
  max_grad_norm: 1.0
  loss_weighting: focal                 # CHANGED: focal loss instead of sqrt_balanced
  focal_gamma: 2.0                      # standard Lin et al. 2017 default
  use_balanced_sampler: true            # NEW: WeightedRandomSampler over train set
  metric_for_best_model: eval_f1_macro
  greater_is_better: true
  early_stopping_patience: 10
  dataloader_num_workers: 2

logging:
  logging_strategy: steps
  logging_steps: 50
  eval_strategy: steps
  eval_steps: 200
  save_strategy: steps
  save_steps: 200
  save_total_limit: 2

dataset_overrides:
  mbti:
    training:
      learning_rate: 1.0e-5             # MBTI nhỏ — cao hơn sẽ overshoot
  essays:
    model:
      max_length: 384
    training:
      batch_size: 8
      gradient_accumulation_steps: 2
  pandora:
    model:
      max_length: 256
    training:
      batch_size: 16
      gradient_accumulation_steps: 1
  personality_evd:
    model:
      max_length: 256
    training:
      batch_size: 16
      gradient_accumulation_steps: 1

wandb:
  group: tier2a_focal
  tags: [tier2a, roberta, transformer, focal_loss, balanced_sampler]
  log_histograms: false

tensorboard:
  enabled: true

output_dir: outputs/models/
seed: 42
