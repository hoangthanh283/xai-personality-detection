version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - qdrant
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    restart: unless-stopped
